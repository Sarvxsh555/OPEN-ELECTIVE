# =========================
# Application Config
# =========================
spring.application.name=oejava
server.port=9090

# Increased thread pool to handle 400 simultaneous HTTP requests
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50

# =========================
# Database Configuration (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/open_elective
spring.datasource.username=root
spring.datasource.password=712724
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Turn OFF SQL logging in production to improve speed (saves I/O)
spring.jpa.show-sql=false 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# =========================
# 🚀 HIKARI CP PERFORMANCE TUNING (CRITICAL FOR 1500 USERS)
# =========================
# The Pool Size: 50 connections allow concurrent DB access without queuing too much.
spring.datasource.hikari.maximum-pool-size=50
# Keep 20 connections ready even when idle, so the first few users don't wait.
spring.datasource.hikari.minimum-idle=20
# If all 50 are busy, wait 30 seconds before crashing.
spring.datasource.hikari.connection-timeout=30000
# Recycle connections every 30 mins to prevent stale links.
spring.datasource.hikari.max-lifetime=1800000