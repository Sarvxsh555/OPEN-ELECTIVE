<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Elective Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="text-center">
      <h1 class="text-5xl font-bold mb-2">Open Elective Course Portal</h1>

      <div
        id="studentLogin"
        class="mt-8 p-8 bg-white rounded-lg shadow-lg max-w-sm mx-auto"
      >
        <h2 class="text-2xl font-semibold mb-6">Student Login</h2>

        <!-- Register Number Input -->
        <input
          type="text"
          id="regno"
          placeholder="Enter Register Number"
          class="w-full px-4 py-2 border rounded-lg mb-4"
          required
          pattern="[0-9]+"
          title="Enter numbers only"
        />

        <button
          id="googleLoginBtn"
          type="button"
          onclick="googleLogin()"
          class="w-full bg-white border border-gray-300 px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-50 mt-4"
        >
          <img
            src="https://www.svgrepo.com/show/355037/google.svg"
            width="20"
          />
          Continue with Google
        </button>

        <p id="errorMessage" class="mt-4 text-red-500 font-medium"></p>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
